<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הפורטל של הילדים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Heebo', sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .tool-card, .folder-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tool-card:hover, .folder-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* צבעים מתחלפים לכרטיסיות כלים */
        .color-0 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .color-1 { background: linear-gradient(135deg, #10b981, #059669); }
        .color-2 { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .color-3 { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
        .color-4 { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .color-5 { background: linear-gradient(135deg, #ec4899, #db2777); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- מסך ראשי (פורטל ילדים) -->
    <div id="portal-screen" class="flex-1 flex flex-col items-center p-6 w-full max-w-5xl mx-auto">
        
        <!-- כפתור אדמין מוסתר בפינה -->
        <div class="w-full flex justify-end mb-2">
            <button onclick="openLoginModal()" class="text-gray-400 hover:text-gray-700 transition-colors p-2 rounded-full hover:bg-gray-200" title="פאנל ניהול (להורים)">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>

        <header class="text-center mb-6">
            <h1 class="text-5xl md:text-6xl font-extrabold text-blue-600 drop-shadow-md mb-2">מרכז הלימודים של אלמה ובן דרעי 🚀</h1>
            <p class="text-xl text-gray-600 font-semibold">איזה נושא נרצה לתרגל היום?</p>
        </header>

        <!-- אזור התוכן - יכיל סרגל ניווט, תיקיות וכלים -->
        <div id="portal-content" class="w-full flex flex-col gap-6 pb-10">
            <!-- התוכן יוזרק לכאן דרך JS -->
        </div>

    </div>

    <!-- מסך פאנל ניהול (אדמין) -->
    <div id="admin-screen" class="hidden flex-1 flex flex-col p-6 w-full max-w-5xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xl p-8 w-full border-t-8 border-gray-800">
            <div class="flex justify-between items-center mb-8 pb-4 border-b-2 border-gray-100">
                <h2 class="text-3xl font-bold text-gray-800 flex items-center gap-2">
                    <span>⚙️</span> פאנל ניהול אפליקציות
                </h2>
                <button onclick="showScreen('portal')" class="bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition-colors">
                    חזרה לפורטל <span class="text-xl">🏠</span>
                </button>
            </div>

            <!-- טופס הוספת/עריכת אפליקציה -->
            <div id="admin-form-container" class="bg-gray-50 rounded-xl p-6 mb-8 border border-gray-200 shadow-sm transition-all duration-300">
                <h3 id="form-title" class="text-xl font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <span>➕</span> הוספת משחק / כלי חדש
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">שם האפליקציה</label>
                        <input type="text" id="new-app-name" placeholder="למשל: חשבון" class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">אימוג'י / סמל</label>
                        <input type="text" id="new-app-icon" placeholder="למשל: 🧮" class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1" title="השתמשו בלוכסן לתתי-תיקיות">תיקייה (למשל: כיתה ג' / חשבון)</label>
                        <input type="text" id="new-app-category" list="categories-list" placeholder="למשל: כללי" class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <datalist id="categories-list"></datalist>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">קישור (URL)</label>
                        <input type="text" id="new-app-url" placeholder="https://..." class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 focus:outline-none dir-ltr" dir="ltr">
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <button id="cancel-edit-btn" onclick="cancelEdit()" class="hidden text-gray-500 hover:text-gray-800 font-bold transition-colors">
                        ביטול עריכה ✖️
                    </button>
                    <div class="flex-1 flex justify-end">
                        <button id="save-app-btn" onclick="saveApp()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-colors flex items-center gap-2">
                            <span>שמור לפורטל</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </div>
                <p id="admin-error" class="text-red-500 mt-2 text-sm font-semibold hidden"></p>
            </div>

            <!-- רשימת האפליקציות הקיימות -->
            <div>
                <h3 class="text-xl font-bold text-gray-700 mb-4">📋 אפליקציות קיימות בפורטל:</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-right border-collapse bg-white shadow-sm rounded-lg overflow-hidden">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 border-b-2 border-gray-200">
                                <th class="p-4 text-center">סמל</th>
                                <th class="p-4">שם האפליקציה</th>
                                <th class="p-4">נתיב תיקייה</th>
                                <th class="p-4 hidden md:table-cell">קישור</th>
                                <th class="p-4 text-center">פעולות</th>
                            </tr>
                        </thead>
                        <tbody id="admin-apps-list">
                            <!-- יוזרק מ-JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- מודאל התחברות לאדמין -->
    <div id="login-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300" id="login-modal-content">
            <div class="text-center mb-6">
                <span class="text-4xl mb-2 block">🔒</span>
                <h3 class="text-2xl font-bold text-gray-800">כניסת הורים</h3>
                <p class="text-gray-500 text-sm mt-1">אנא הכנס את קוד הגישה לפאנל הניהול</p>
            </div>
            
            <input type="password" id="admin-pin" placeholder="קוד סודי" class="w-full text-center text-2xl tracking-widest px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none mb-4 dir-ltr" dir="ltr" inputmode="numeric">
            
            <p id="login-error" class="text-red-500 text-center text-sm mb-4 font-semibold hidden">קוד שגוי, נסה שוב.</p>
            
            <div class="flex gap-3">
                <button onclick="closeLoginModal()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-xl transition-colors">
                    ביטול
                </button>
                <button onclick="checkPin()" class="flex-1 bg-gray-800 hover:bg-black text-white font-bold py-3 px-4 rounded-xl shadow-md transition-colors">
                    כניסה
                </button>
            </div>
        </div>
    </div>

    <!-- הודעת אישור (Toast) -->
    <div id="toast-message" class="fixed bottom-5 right-5 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg font-bold transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2 border-l-4 border-green-400">
        <span id="toast-text">הפעולה בוצעה בהצלחה!</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === הגדרות ענן וחיבור למסד הנתונים ===
        
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: window.env?.FIREBASE_API_KEY || "AIzaSyB9ATc7fsyds8e-zLiQuN8vCo9-CfnO6C0",
                authDomain: "kids-portal-bd.firebaseapp.com",
                projectId: "kids-portal-bd",
                storageBucket: "kids-portal-bd.firebasestorage.app",
                messagingSenderId: "881195401114",
                appId: "1:881195401114:web:2c3bfe6bb02ce9d51f0423",
                measurementId: "G-FN2JNYHZTJ"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kids-portal-main'; 
        
        let currentUser = null;
        let unsubscribeDb = null;

        // === נתונים והגדרות ===
        const ADMIN_PIN = "1122"; 
        let currentApps = [];
        let editingAppId = null; 
        
        // נתיב הניווט הנוכחי במערכת התיקיות
        let currentPath = [];

        // === אתחול האפליקציה ===
        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("שגיאה בהתחברות ל-Firebase:", error);
                showToast("ישנה בעיה בהתחברות לשרת.");
            }

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    setupDatabaseListener();
                } else {
                    if (unsubscribeDb) unsubscribeDb();
                }
            });
            
            document.getElementById('admin-pin').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') checkPin();
            });
        }

        // === האזנה לנתונים בזמן אמת ===
        function setupDatabaseListener() {
            if (!currentUser) return;

            const appsRef = collection(db, 'artifacts', appId, 'public', 'data', 'apps');
            
            unsubscribeDb = onSnapshot(appsRef, (snapshot) => {
                currentApps = [];
                snapshot.forEach((doc) => {
                    currentApps.push({ id: doc.id, ...doc.data() });
                });
                
                currentApps.sort((a, b) => a.createdAt - b.createdAt);

                renderPortal();
                updateCategoriesDatalist();
                
                if (!document.getElementById('admin-screen').classList.contains('hidden')) {
                    renderAdminTable();
                }
            }, (error) => {
                console.error("שגיאה בהורדת נתונים מהענן:", error);
            });
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        // מחלץ את כל התיקיות הייחודיות להשלמה אוטומטית
        function updateCategoriesDatalist() {
            const datalist = document.getElementById('categories-list');
            datalist.innerHTML = '';
            
            // נשלוף את כל המחרוזות הייחודיות של הקטגוריות
            const categories = new Set(currentApps.map(app => app.category).filter(c => c));
            
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                datalist.appendChild(option);
            });
        }

        // פונקציות ניווט תיקיות
        function openFolder(folderName) {
            currentPath.push(folderName);
            renderPortal();
        }

        function goToPath(index) {
            currentPath = currentPath.slice(0, index + 1);
            renderPortal();
        }

        function goToRoot() {
            currentPath = [];
            renderPortal();
        }

        // === ניהול תצוגה (UI) ===
        function showScreen(screenName) {
            document.getElementById('portal-screen').classList.add('hidden');
            document.getElementById('admin-screen').classList.add('hidden');
            
            if (screenName === 'portal') {
                renderPortal();
                document.getElementById('portal-screen').classList.remove('hidden');
            } else if (screenName === 'admin') {
                renderAdminTable();
                document.getElementById('admin-screen').classList.remove('hidden');
            }
        }

        function renderPortal() {
            const container = document.getElementById('portal-content');
            container.innerHTML = '';

            if (currentApps.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 mt-10 text-xl font-bold">עדיין לא הוספו משחקים... בקשו מההורים להוסיף דרך פאנל הניהול! 🛠️</div>`;
                return;
            }

            // יצירת סרגל ניווט (Breadcrumbs)
            const nav = document.createElement('nav');
            nav.className = 'flex flex-wrap items-center gap-2 mb-4 w-full text-xl font-bold text-gray-600 bg-white/60 p-4 rounded-xl shadow-sm border border-blue-50';
            
            let navHtml = `<button onclick="goToRoot()" class="hover:text-blue-600 transition-colors flex items-center gap-2">🏠 ראשי</button>`;
            
            currentPath.forEach((folder, index) => {
                navHtml += `<span class="text-gray-400 text-sm">◀</span>`;
                if (index === currentPath.length - 1) {
                    navHtml += `<span class="text-blue-600 cursor-default">${folder}</span>`;
                } else {
                    navHtml += `<button onclick="goToPath(${index})" class="hover:text-blue-600 transition-colors">${folder}</button>`;
                }
            });
            nav.innerHTML = navHtml;
            container.appendChild(nav);

            // איסוף תוכן לתיקייה הנוכחית
            const foldersInCurrentPath = {}; // מילון של תיקיות בתוך התיקייה הנוכחית (שם תיקייה -> מערך אפליקציות)
            const directAppsInCurrentPath = []; // אפליקציות שנמצאות ממש בתיקייה הזו

            currentApps.forEach(app => {
                const catStr = app.category || '';
                // מפרק את מחרוזת התיקיות ("א / ב / ג" יהפוך ל ["א", "ב", "ג"])
                const parts = catStr.split('/').map(p => p.trim()).filter(p => p);
                
                // בדיקה האם האפליקציה נמצאת תחת הנתיב הנוכחי שלנו
                let matchesPath = true;
                for(let i=0; i<currentPath.length; i++) {
                    if(parts[i] !== currentPath[i]) {
                        matchesPath = false;
                        break;
                    }
                }

                if(matchesPath) {
                    if(parts.length === currentPath.length) {
                        // האפליקציה נמצאת ישירות בתוך התיקייה הנוכחית
                        directAppsInCurrentPath.push(app);
                    } else {
                        // האפליקציה נמצאת בתת-תיקייה
                        const nextFolderName = parts[currentPath.length];
                        if(!foldersInCurrentPath[nextFolderName]) {
                            foldersInCurrentPath[nextFolderName] = [];
                        }
                        foldersInCurrentPath[nextFolderName].push(app);
                    }
                }
            });

            // רינדור התיקיות (תצוגה מקדימה)
            const folderNames = Object.keys(foldersInCurrentPath);
            if (folderNames.length > 0) {
                const folderGrid = document.createElement('div');
                folderGrid.className = 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 w-full mb-8';
                
                folderNames.forEach(folderName => {
                    const appsInFolder = foldersInCurrentPath[folderName];
                    const count = appsInFolder.length;
                    
                    // איסוף עד 4 אימוג'ים לתצוגה המקדימה
                    const previews = appsInFolder.slice(0, 4).map(a => a.icon || '⭐');
                    let previewHtml = '';
                    previews.forEach(icon => {
                        previewHtml += `<div class="w-8 h-8 bg-white/80 rounded-full flex items-center justify-center text-sm shadow-sm">${icon}</div>`;
                    });
                    if (count > 4) {
                        previewHtml += `<div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-xs font-bold shadow-sm text-gray-600">+${count-4}</div>`;
                    }

                    const folderCard = document.createElement('div');
                    folderCard.onclick = () => openFolder(folderName);
                    folderCard.className = `folder-card bg-gradient-to-br from-yellow-100 to-yellow-200 border-2 border-yellow-300 rounded-3xl p-6 cursor-pointer flex flex-col items-center gap-2 shadow-sm relative overflow-hidden`;
                    
                    // עיצוב יפה לתיקייה
                    folderCard.innerHTML = `
                        <div class="absolute top-0 right-0 w-1/2 h-4 bg-yellow-300 rounded-bl-xl opacity-50"></div>
                        <span class="text-6xl mt-2 mb-1 drop-shadow-md">📁</span>
                        <h3 class="text-2xl font-extrabold text-yellow-900 text-center leading-tight z-10">${folderName}</h3>
                        <div class="flex flex-wrap justify-center gap-1.5 mt-2 z-10">
                            ${previewHtml}
                        </div>
                        <div class="text-xs bg-yellow-300 text-yellow-900 font-bold px-3 py-1 rounded-full mt-2 z-10 shadow-sm">${count} פריטים</div>
                    `;
                    folderGrid.appendChild(folderCard);
                });
                container.appendChild(folderGrid);
            }

            // רינדור האפליקציות הישירות (כלים) בתוך התיקייה הנוכחית
            if (directAppsInCurrentPath.length > 0) {
                // כותרת מפרידה אם יש גם תיקיות וגם כלים מעורבבים
                if (folderNames.length > 0) {
                    const sep = document.createElement('div');
                    sep.innerHTML = `<h3 class="text-2xl font-bold text-gray-700 mb-4 category-title">🛠️ כלים בתיקייה זו</h3>`;
                    container.appendChild(sep);
                }

                const appsGrid = document.createElement('div');
                appsGrid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 w-full';
                
                let colorIndexCounter = 0;
                directAppsInCurrentPath.forEach((appItem) => {
                    const colorClass = `color-${colorIndexCounter % 6}`; 
                    colorIndexCounter++;
                    
                    const card = document.createElement('a');
                    card.href = appItem.url;
                    card.className = `tool-card ${colorClass} text-white rounded-3xl p-6 flex flex-col items-center justify-center text-center gap-3 cursor-pointer no-underline block h-full`;
                    
                    if(appItem.url === "#" || appItem.url === "") {
                        card.onclick = (e) => {
                            e.preventDefault();
                            showToast("עדיין לא הוגדר קישור לאפליקציה זו. כנסו לאדמין לעדכן!");
                        }
                    }

                    card.innerHTML = `
                        <span class="text-7xl drop-shadow-lg mb-2">${appItem.icon || '⭐'}</span>
                        <h3 class="text-3xl font-extrabold drop-shadow-md leading-tight">${appItem.name}</h3>
                        <div class="mt-auto bg-white bg-opacity-25 hover:bg-opacity-40 transition-colors px-6 py-2 rounded-full font-bold text-lg flex items-center gap-2 shadow-sm">
                            כניסה <span>▶</span>
                        </div>
                    `;
                    appsGrid.appendChild(card);
                });
                container.appendChild(appsGrid);
            }

            // אם התיקייה הנוכחית ריקה לגמרי (לא אמור לקרות אלא אם מחקו הכל בזמן שהיינו בפנים)
            if (folderNames.length === 0 && directAppsInCurrentPath.length === 0 && currentPath.length > 0) {
                 container.innerHTML += `<div class="text-center text-gray-500 mt-10 text-xl font-bold w-full">התיקייה הזו ריקה 📭</div>`;
            }
        }

        function renderAdminTable() {
            const list = document.getElementById('admin-apps-list');
            list.innerHTML = '';

            if (currentApps.length === 0) {
                list.innerHTML = `<tr><td colspan="5" class="text-center p-6 text-gray-500">אין אפליקציות מוגדרות.</td></tr>`;
                return;
            }

            currentApps.forEach(appItem => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-100 hover:bg-gray-50 transition-colors";
                
                // תצוגת נתיב יפה בטבלה
                const categoryBadge = appItem.category ? 
                    `<span class="bg-purple-100 text-purple-800 text-xs font-bold px-2 py-1 rounded-md border border-purple-200 break-words">${appItem.category.replace(/\//g, ' ◀ ')}</span>` : 
                    `<span class="bg-gray-200 text-gray-600 text-xs font-bold px-2 py-1 rounded-md">ראשי</span>`;

                tr.innerHTML = `
                    <td class="p-4 text-3xl text-center w-16">${appItem.icon || '⭐'}</td>
                    <td class="p-4 font-bold text-gray-800 text-lg">${appItem.name}</td>
                    <td class="p-4 max-w-xs">${categoryBadge}</td>
                    <td class="p-4 text-left dir-ltr hidden md:table-cell max-w-xs">
                        <div class="truncate text-blue-500 text-sm bg-blue-50 px-2 py-1 rounded border border-blue-100" dir="ltr" title="${appItem.url}">
                            ${appItem.url}
                        </div>
                    </td>
                    <td class="p-4 text-center flex justify-center gap-2 flex-wrap">
                        <button onclick="startEdit('${appItem.id}')" class="text-blue-500 hover:text-white border border-blue-500 hover:bg-blue-500 font-bold py-1 px-3 rounded transition-colors text-sm" title="ערוך אפליקציה">
                            ערוך ✏️
                        </button>
                        <button onclick="deleteApp('${appItem.id}')" class="text-red-500 hover:text-white border border-red-500 hover:bg-red-500 font-bold py-1 px-3 rounded transition-colors text-sm" title="מחק אפליקציה">
                            מחק 🗑️
                        </button>
                    </td>
                `;
                list.appendChild(tr);
            });
        }

        // === פונקציות אדמין (שמירה / עריכה / מחיקה) ===
        
        function startEdit(id) {
            const appToEdit = currentApps.find(a => a.id === id);
            if (!appToEdit) return;

            editingAppId = id; 
            
            document.getElementById('new-app-name').value = appToEdit.name || '';
            document.getElementById('new-app-icon').value = appToEdit.icon || '';
            document.getElementById('new-app-url').value = appToEdit.url || '';
            document.getElementById('new-app-category').value = appToEdit.category || '';
            
            document.getElementById('form-title').innerHTML = `<span>✏️</span> עריכת כלי: <span class="text-blue-600">${appToEdit.name}</span>`;
            
            const saveBtn = document.getElementById('save-app-btn');
            saveBtn.innerHTML = `
                <span>עדכן כלי</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                </svg>
            `;
            saveBtn.classList.remove('bg-green-500', 'hover:bg-green-600');
            saveBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
            
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            
            document.getElementById('admin-form-container').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('admin-form-container').classList.add('ring-4', 'ring-blue-200');
            setTimeout(() => document.getElementById('admin-form-container').classList.remove('ring-4', 'ring-blue-200'), 1000);
        }

        function cancelEdit() {
            editingAppId = null;
            
            document.getElementById('new-app-name').value = '';
            document.getElementById('new-app-icon').value = '';
            document.getElementById('new-app-url').value = '';
            document.getElementById('new-app-category').value = '';
            
            document.getElementById('form-title').innerHTML = `<span>➕</span> הוספת משחק / כלי חדש`;
            
            const saveBtn = document.getElementById('save-app-btn');
            saveBtn.innerHTML = `
                <span>שמור לפורטל</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                </svg>
            `;
            saveBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
            saveBtn.classList.add('bg-green-500', 'hover:bg-green-600');
            
            document.getElementById('cancel-edit-btn').classList.add('hidden');
            document.getElementById('admin-error').classList.add('hidden');
        }

        async function saveApp() {
            if (!currentUser) {
                showToast("מתחבר לשרת, אנא המתן שניה ונסה שוב.");
                return;
            }

            const nameInput = document.getElementById('new-app-name');
            const iconInput = document.getElementById('new-app-icon');
            const urlInput = document.getElementById('new-app-url');
            const catInput = document.getElementById('new-app-category');
            const errorMsg = document.getElementById('admin-error');

            const name = nameInput.value.trim();
            const icon = iconInput.value.trim() || '⭐';
            const url = urlInput.value.trim();
            const category = catInput.value.trim(); // נשמר ריק אם לא הוזן, וזה אומר "ראשי"

            if (!name || !url) {
                errorMsg.textContent = "חובה להזין שם וקישור URL.";
                errorMsg.classList.remove('hidden');
                return;
            }
            errorMsg.classList.add('hidden');

            try {
                if (editingAppId) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'apps', editingAppId);
                    await updateDoc(docRef, { name, icon, url, category });
                    showToast("הכלי עודכן בתיקייה בהצלחה! ✅");
                } else {
                    const newId = generateId();
                    const newApp = { name, icon, url, category, createdAt: Date.now() };
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'apps', newId);
                    await setDoc(docRef, newApp);
                    showToast("האפליקציה נוספה בהצלחה! ✨");
                }
                
                cancelEdit();
                
            } catch (error) {
                console.error("שגיאה בשמירה:", error);
                errorMsg.textContent = "שגיאה בשמירה לענן.";
                errorMsg.classList.remove('hidden');
            }
        }

        async function deleteApp(id) {
            if (!currentUser) return;

            if(confirm("האם למחוק את הכלי מהפורטל? פעולה זו תסיר אותו מכל המכשירים.")) {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'apps', id);
                    await deleteDoc(docRef);
                    showToast("האפליקציה נמחקה מהפורטל. 🗑️");
                    
                    if (editingAppId === id) {
                        cancelEdit(); 
                    }
                } catch (error) {
                    console.error("שגיאה במחיקה:", error);
                }
            }
        }

        // === מערכת התחברות (מודאל) ===
        function openLoginModal() {
            const modal = document.getElementById('login-modal');
            const content = document.getElementById('login-modal-content');
            const input = document.getElementById('admin-pin');
            
            input.value = '';
            document.getElementById('login-error').classList.add('hidden');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                input.focus();
            }, 10);
        }

        function closeLoginModal() {
            const modal = document.getElementById('login-modal');
            const content = document.getElementById('login-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function checkPin() {
            const input = document.getElementById('admin-pin').value;
            const errorMsg = document.getElementById('login-error');
            
            if (input === ADMIN_PIN) {
                closeLoginModal();
                showScreen('admin');
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('admin-pin').value = '';
                document.getElementById('admin-pin').focus();
            }
        }

        // === הודעות (Toasts) ===
        function showToast(message) {
            const toast = document.getElementById('toast-message');
            const toastText = document.getElementById('toast-text');
            
            toastText.textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        window.openLoginModal = openLoginModal;
        window.closeLoginModal = closeLoginModal;
        window.checkPin = checkPin;
        window.showScreen = showScreen;
        window.saveApp = saveApp;
        window.startEdit = startEdit;
        window.cancelEdit = cancelEdit;
        window.deleteApp = deleteApp;
        window.goToRoot = goToRoot;
        window.goToPath = goToPath;
        window.openFolder = openFolder;

        window.onload = init;

    </script>
</body>
</html>
